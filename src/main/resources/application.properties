quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL:jdbc:postgresql://localhost:5432/quarkus_batch}
quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME:postgres}
quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD:postgres}

quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.persistence-xml.ignore=true
quarkus.hibernate-orm.active=true

quarkus.http.test-port=0
%dev.quarkus.http.host=0.0.0.0
quarkus.http.port=8989
